apiVersion: events.ibm.com/v1beta1
kind: EventGateway
metadata:
  name: ${INST_NAME}
  labels:
    backup.events.ibm.com/component: eventgateway
    events.ibm.com/manager: ${EEM_INST_NAME}
spec:
  license:
    accept: true
    license: ${INST_LIC}
    metric: VIRTUAL_PROCESSOR_CORE
    use: CloudPakForIntegrationNonProduction
  listeners:
    - name: listener
      port: 8092
      groups:
        - name: group
          type: EXPLICIT
          maxNumKafkaBrokers: 3
  gatewayGroupName: egw-group
  gatewayID: egw-1
  template:
    pod:
      spec:
        containers:
          - name: egw
            resources:
              requests:
                cpu: '0.5'
                memory: 512Mi
              limits:
                cpu: '1'
                memory: 1Gi