apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: ${INST_NAME}-gw-gateway-ui
spec:
  host: "${INST_NAME}-gw-gateway-ui-${NS_NAME}.${STACK_HOST}"
  to:
    kind: Service
    name: ${INST_NAME}-gw-datapower
    weight: 100
  port:
    targetPort: webgui-port
  tls:
    termination: passthrough
  wildcardPolicy: None